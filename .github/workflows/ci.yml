name: CI

on:
  push:
  pull_request:

jobs:
  core-tests:
    # Builds the dependency-free core and runs the unit tests. The full app
    # needs SDL3, which ubuntu-latest does not package yet; app builds are
    # validated locally until the runner image catches up.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build g++
      - name: Configure
        run: cmake -B build -G Ninja -DLSFG_BUILD_APP=OFF
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
